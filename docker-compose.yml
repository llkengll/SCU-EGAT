version: '3.8'

services:
  # Computer 1: Web Interface & API
  nginx:
    image: nginx:alpine
    container_name: scu-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web-server/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./web-server/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web-frontend
      - web-backend
    networks:
      - scu-network

  web-frontend:
    build:
      context: ./web-server/client
    container_name: scu-frontend
    restart: always
    environment:
      - VITE_API_BASE_URL=/api
    networks:
      - scu-network

  web-backend:
    build:
      context: ./web-server/backend
    container_name: scu-backend
    restart: always
    env_file:
      - .env
    environment:
      - PORT=3000
      - DB_HOST=postgres
      - MINIO_ENDPOINT=minio
      - ML_SERVER_URL=http://ml-server:5000
      - NODE_ENV=production
    depends_on:
      - postgres
      - minio
    networks:
      - scu-network

  # Computer 2: Machine Learning Engine
  ml-server:
    build:
      context: ./ml-server
    container_name: scu-ml-server
    restart: always
    env_file:
      - .env
    environment:
      - PORT=5000
      - DB_HOST=postgres
      - MINIO_ENDPOINT=minio
      - NODE_ENV=production
    depends_on:
      - postgres
      - minio
    networks:
      - scu-network

  # Computer 3: Data & Storage
  postgres:
    image: postgres:15-alpine
    container_name: scu-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-admin123}
      - POSTGRES_DB=${POSTGRES_DB:-scu_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - scu-network

  minio:
    image: minio/minio
    container_name: scu-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - scu-network

networks:
  scu-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
